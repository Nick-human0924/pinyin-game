<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拼音游戏 - 测试版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .btn { background: white; color: #667eea; border: none; padding: 20px; border-radius: 15px; font-size: 18px; font-weight: bold; width: 100%; margin: 10px 0; cursor: pointer; }
        .page { background: white; border-radius: 20px; padding: 30px; margin-top: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 主页面 -->
        <div id="main" class="page">
            <h1 style="text-align: center; color: #667eea; margin-bottom: 30px;">🎮 拼音大冒险</h1>
            <button class="btn" id="btn1">📖 基础教学</button>
            <button class="btn" id="btn2">⚔️ 闯关模式</button>
            <button class="btn" id="btn3">🐼 我的宠物</button>
            <button class="btn" id="btn4">📊 统计看板</button>
        </div>
        
        <!-- 教学页面 -->
        <div id="learning" class="page hidden">
            <h2 style="text-align: center;">📖 基础教学</h2>
            <p style="margin: 20px 0;">这里是教学内容...</p>
            <button class="btn" id="back1">← 返回</button>
        </div>
        
        <!-- 游戏页面 -->
        <div id="game" class="page hidden">
            <h2 style="text-align: center;">⚔️ 闯关模式</h2>
            <p style="margin: 20px 0;">这里是游戏内容...</p>
            <button class="btn" id="back2">← 返回</button>
        </div>
        
        <!-- 宠物页面 -->
        <div id="pet" class="page hidden">
            <h2 style="text-align: center;">🐼 我的宠物</h2>
            <p style="margin: 20px 0;">这里是宠物内容...</p>
            <button class="btn" id="back3">← 返回</button>
        </div>
        
        <!-- 统计页面 -->
        <div id="stats" class="page hidden">
            <h2 style="text-align: center;">📊 统计看板</h2>
            <p style="margin: 20px 0;">这里是统计内容...</p>
            <button class="btn" id="back4">← 返回</button>
        </div>
    </div>

    <script>
        // 页面切换函数
        function showPage(pageId) {
            // 隐藏所有页面
            document.getElementById('main').classList.add('hidden');
            document.getElementById('learning').classList.add('hidden');
            document.getElementById('game').classList.add('hidden');
            document.getElementById('pet').classList.add('hidden');
            document.getElementById('stats').classList.add('hidden');
            
            // 显示指定页面
            document.getElementById(pageId).classList.remove('hidden');
            
            console.log('切换到页面:', pageId);
        }
        
        // 绑定按钮事件
        document.getElementById('btn1').onclick = function() { showPage('learning'); };
        document.getElementById('btn2').onclick = function() { showPage('game'); };
        document.getElementById('btn3').onclick = function() { showPage('pet'); };
        document.getElementById('btn4').onclick = function() { showPage('stats'); };
        
        document.getElementById('back1').onclick = function() { showPage('main'); };
        document.getElementById('back2').onclick = function() { showPage('main'); };
        document.getElementById('back3').onclick = function() { showPage('main'); };
        document.getElementById('back4').onclick = function() { showPage('main'); };
        
        console.log('页面加载完成，事件已绑定');
    </script>
</body>
</html>
