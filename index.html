<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拼音游戏诊断版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            -webkit-tap-highlight-color: transparent;
        }
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; color: #667eea; margin-bottom: 20px; }
        .btn { 
            display: block; 
            width: 100%; 
            padding: 20px; 
            margin: 10px 0; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 18px; 
            cursor: pointer;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            user-select: none;
        }
        .btn:active { 
            transform: scale(0.98); 
            opacity: 0.9;
        }
        .hidden { display: none !important; }
        .page { padding: 20px; }
        .debug-info {
            background: #f0f0f0;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            font-size: 12px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 拼音大冒险</h1>
        <div id="debug" class="debug-info">页面加载中...</div>
        
        <!-- 主菜单 -->
        <div id="mainMenu" class="page">
            <button class="btn" id="btn1">📖 基础教学</button>
            <button class="btn" id="btn2">🎮 开始游戏</button>
            <button class="btn" id="btn3">🐼 我的宠物</button>
            <button class="btn" id="btn4">📊 统计看板</button>
        </div>

        <!-- 基础教学 -->
        <div id="learning" class="page hidden">
            <h2>📖 基础教学</h2>
            <p>点击拼音查看读音：</p>
            <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0;">
                <button onclick="say('b')">b</button>
                <button onclick="say('p')">p</button>
                <button onclick="say('m')">m</button>
                <button onclick="say('f')">f</button>
                <button onclick="say('d')">d</button>
            </div>
            <button class="btn" onclick="goHome()">← 返回主菜单</button>
        </div>

        <!-- 游戏 -->
        <div id="game" class="page hidden">
            <h2>🎮 游戏关卡</h2>
            <div id="quiz">
                <p style="font-size: 24px; text-align: center; margin: 20px;">b</p>
                <button class="btn" onclick="checkAnswer(0)">玻</button>
                <button class="btn" onclick="checkAnswer(1)">坡</button>
                <button class="btn" onclick="checkAnswer(0)">摸</button>
                <button class="btn" onclick="checkAnswer(0)">佛</button>
            </div>
            <button class="btn" onclick="goHome()">← 返回主菜单</button>
        </div>

        <!-- 宠物 -->
        <div id="pet" class="page hidden">
            <h2>🐼 我的宠物</h2>
            <div style="text-align: center; font-size: 100px;">🐼</div>
            <p style="text-align: center;">拼音小熊猫 | 等级 1</p>
            <button class="btn" onclick="goHome()">← 返回主菜单</button>
        </div>

        <!-- 统计 -->
        <div id="stats" class="page hidden">
            <h2>📊 统计看板</h2>
            <p>学习时长: 0分钟</p>
            <p>正确率: 0%</p>
            <button class="btn" onclick="goHome()">← 返回主菜单</button>
        </div>
    </div>

    <script>
        // 调试信息
        var debugEl = document.getElementById('debug');
        function log(msg) {
            debugEl.innerHTML += '<br>' + msg;
            console.log(msg);
        }
        
        log('✅ JavaScript已加载');
        
        // 页面切换函数
        function showPage(pageId) {
            log('切换到: ' + pageId);
            document.querySelectorAll('.page').forEach(function(p) {
                p.classList.add('hidden');
            });
            var el = document.getElementById(pageId);
            if (el) {
                el.classList.remove('hidden');
                log('✅ 页面显示成功');
            } else {
                log('❌ 页面不存在: ' + pageId);
            }
        }
        
        function goHome() {
            log('返回首页');
            showPage('mainMenu');
        }
        
        function say(pinyin) {
            alert('拼音: ' + pinyin);
        }
        
        function checkAnswer(isCorrect) {
            if (isCorrect) {
                alert('✅ 回答正确！');
            } else {
                alert('❌ 再想想~');
            }
        }
        
        // 绑定按钮事件
        document.getElementById('btn1').addEventListener('click', function() {
            log('点击: 基础教学');
            showPage('learning');
        });
        
        document.getElementById('btn2').addEventListener('click', function() {
            log('点击: 开始游戏');
            showPage('game');
        });
        
        document.getElementById('btn3').addEventListener('click', function() {
            log('点击: 我的宠物');
            showPage('pet');
        });
        
        document.getElementById('btn4').addEventListener('click', function() {
            log('点击: 统计看板');
            showPage('stats');
        });
        
        log('✅ 所有按钮事件已绑定');
        
        // 移动端优化
        document.addEventListener('touchstart', function(){}, {passive: true});
        document.addEventListener('dblclick', function(e) {
            e.preventDefault();
        }, { passive: false });
        
        // 防止缩放
        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });
        
        log('✅ 移动端优化已启用');
        log('🎮 游戏准备就绪！');
    </script>
</body>
</html>
