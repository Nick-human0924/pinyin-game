<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼音探险岛 - 升级版</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <!-- 加载画面 -->
        <div id="loading-screen">
            <div class="loading-text">正在进入拼音探险岛...</div>
        </div>
        
        <!-- 主菜单 -->
        <div id="main-menu" class="screen hidden">
            <h1>拼音探险岛</h1>
            <div class="menu-buttons">
                <button id="btn-start" class="btn-primary">开始探险</button>
                <button id="btn-continue" class="btn-secondary">继续游戏</button>
                <button id="btn-parent" class="btn-secondary">家长中心</button>
            </div>
        </div>
        
        <!-- 游戏场景 -->
        <div id="game-scene" class="screen hidden">
            <div id="scene-background"></div>
            <div id="character-container">
                <img id="main-character" src="assets/character_main.png" alt="小书童">
            </div>
            
            <div id="game-ui">
                <div id="progress-bar">
                    <div id="progress-fill"></div>
                </div>
                <div id="question-area">
                    <div id="pinyin-display"></div>
                    <div id="options-container"></div>
                </div>
                
                <div id="feedback-area" class="hidden">
                    <div id="feedback-text"></div>
                    <button id="btn-next">继续</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="src/game.js"></script>
</body>
</html>
