<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拼音大冒险 5.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding: 10px;
            -webkit-tap-highlight-color: transparent;
        }
        .game-container { 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 10px; 
        }
        /* 头部 */
        .header { 
            background: rgba(255,255,255,0.95); 
            border-radius: 15px; 
            padding: 15px; 
            margin-bottom: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .player-info { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }
        .avatar { 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 30px;
        }
        .stats { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; 
        }
        .stat-item { 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            background: #F7F9FC; 
            padding: 8px 12px; 
            border-radius: 20px; 
            font-size: 13px; 
            font-weight: bold; 
        }
        /* 主菜单 */
        .main-menu { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }
        .menu-card { 
            background: rgba(255,255,255,0.95); 
            border-radius: 20px; 
            padding: 25px 15px; 
            text-align: center; 
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            touch-action: manipulation;
            user-select: none;
            transition: transform 0.2s;
        }
        .menu-card:active { 
            transform: scale(0.98); 
        }
        .menu-card .icon { 
            font-size: 40px; 
            margin-bottom: 10px; 
        }
        .menu-card h2 { 
            font-size: 16px; 
            color: #2C3E50; 
            margin-bottom: 5px;
        }
        .menu-card p { 
            font-size: 12px; 
            color: #7f8c8d; 
        }
        .menu-card.locked {
            opacity: 0.6;
            background: #e0e0e0;
        }
        .badge {
            background: #4CAF50;
            color: white;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 11px;
            margin-top: 8px;
            display: inline-block;
        }
        /* 页面通用 */
        .page { 
            background: rgba(255,255,255,0.95); 
            border-radius: 20px; 
            padding: 20px; 
            min-height: 500px;
        }
        .hidden { display: none !important; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            touch-action: manipulation;
        }
        .btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        .btn-secondary {
            background: #F7F9FC;
            color: #2C3E50;
        }
        /* 基础教学 */
        .learning-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
        }
        .learning-tab {
            padding: 10px 15px;
            background: #F7F9FC;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 14px;
        }
        .learning-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .pinyin-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .pinyin-card {
            padding: 15px 5px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
            cursor: pointer;
        }
        .pinyin-card:active {
            background: #667eea;
            color: white;
        }
        /* 答题界面 */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.3s;
        }
        .question-display {
            font-size: 48px;
            text-align: center;
            margin: 30px 0;
            color: #667eea;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }
        .option-btn {
            padding: 20px;
            background: #F7F9FC;
            border: 2px solid transparent;
            border-radius: 15px;
            font-size: 18px;
            cursor: pointer;
            touch-action: manipulation;
        }
        .option-btn:active {
            border-color: #667eea;
            background: #e8eaf6;
        }
        .option-btn.correct {
            background: #4CAF50;
            color: white;
        }
        .option-btn.wrong {
            background: #f44336;
            color: white;
        }
        /* 统计看板 */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .stats-card {
            background: #F7F9FC;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .stats-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }
        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 350px;
            width: 100%;
            text-align: center;
        }
        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 头部 -->
        <div class="header">
            <div class="player-info">
                <div class="avatar" onclick="showPet()">🐼</div>
                <div>
                    <div style="font-weight: bold;">拼音小勇士</div>
                    <div class="stats">
                        <div class="stat-item">💰 <span id="coins">100</span></div>
                        <div class="stat-item">⭐ <span id="exp">0</span></div>
                        <div class="stat-item">❤️ <span id="hp">100</span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 主菜单 -->
        <div id="mainMenu" class="main-menu">
            <div class="menu-card" onclick="showLearning()">
                <div class="icon">📖</div>
                <h2>基础教学</h2>
                <p>声母、韵母、整体认读</p>
                <div class="badge" id="learningBadge">进行中</div>
            </div>
            <div class="menu-card locked" id="challengeCard" onclick="if(!this.classList.contains('locked'))showGame()">
                <div class="icon">⚔️</div>
        <!-- 商店 -->
        <div id="shop" class="page hidden">
            <button class="btn btn-secondary" onclick="showMainMenu()">← 返回主菜单</button>
            <h2 style="text-align: center; margin: 20px 0;">🏪 商店</h2>
            <div style="text-align: center; margin-bottom: 20px; background: #F7F9FC; padding: 15px; border-radius: 15px;">
                <div style="font-size: 24px; font-weight: bold; color: #667eea;">💰 <span id="shopCoins">100</span> 金币</div>
            </div>
            
            <!-- 商店分类标签 -->
            <div style="display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto;">
                <button class="btn" style="width: auto; padding: 10px 20px;" onclick="switchShopTab('weapons')">⚔️ 武器</button>
                <button class="btn" style="width: auto; padding: 10px 20px; background: #F7F9FC; color: #333;" onclick="switchShopTab('armor')">🛡️ 防具</button>
                <button class="btn" style="width: auto; padding: 10px 20px; background: #F7F9FC; color: #333;" onclick="switchShopTab('items')">🧪 道具</button>
                <button class="btn" style="width: auto; padding: 10px 20px; background: #F7F9FC; color: #333;" onclick="switchShopTab('skills')">📖 技能</button>
            </div>
            
            <!-- 商品列表 -->
            <div id="shopItems" style="display: grid; gap: 10px;">
                <!-- 动态加载 -->
            </div>
        </div>
                </div>
                <div class="stats-card">
                    <div>🎯 正确率</div>
                    <div class="stats-value">0%</div>
                    <div>答题统计</div>
                </div>
                <div class="stats-card">
                    <div>📈 完成关卡</div>
                    <div class="stats-value">0</div>
                    <div>共15关</div>
                </div>
                <div class="stats-card">
                    <div>🔥 连续打卡</div>
                    <div class="stats-value">0</div>
                    <div>天</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 弹窗 -->
    <div id="modal" class="modal-overlay hidden" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-title" id="modalTitle">提示</div>
            <div id="modalText">内容</div>
            <button class="btn" onclick="closeModal()" style="margin-top: 20px;">确定</button>
        </div>
    </div>

    <script>
        // 游戏数据
        var gameData = {
            coins: 100,
            exp: 0,
            hp: 100,
            energy: 50,
            learningComplete: false,
            completedLevels: []
        };

        var learningProgress = { initial: false, final: false, whole: false };
        var currentQuestion = 0;
        var correctCount = 0;

        // 拼音数据
        var pinyinData = {
            initial: ['b','p','m','f','d','t','n','l','g','k','h','j','q','x','zh','ch','sh','r','z','c','s','y','w'],
            final: ['a','o','e','i','u','ü','ai','ei','ui','ao','ou','iu','ie','üe','er','an','en','in','un','ün','ang','eng','ing','ong'],
            whole: ['zhi','chi','shi','ri','zi','ci','si','yi','wu','yu','ye','yue','yuan','yin','yun','ying']
        };

        // 页面切换
        function hideAll() {
            document.querySelectorAll('.page, .main-menu').forEach(function(el) {
                el.classList.add('hidden');
            });
        }

        function showMainMenu() {
            hideAll();
            document.querySelector('.main-menu').classList.remove('hidden');
            updateUI();
        }

        function showLearning() {
            hideAll();
            document.getElementById('learning').classList.remove('hidden');
            switchTab('initial');
        }

        function showGame() {
            hideAll();
            document.getElementById('game').classList.remove('hidden');
            startQuiz();
        }

        function showPet() {
            hideAll();
            document.getElementById('pet').classList.remove('hidden');
        }

        function showMap() {
            hideAll();
            document.getElementById('map').classList.remove('hidden');
        }

        
        // 商店数据
        var shopData = {
            weapons: [
                { id: "w1", name: "木剑", icon: "🗡️", price: 50, attack: 5, desc: "新手的基础武器" },
                { id: "w2", name: "铁剑", icon: "⚔️", price: 150, attack: 12, desc: "比木剑更锋利" },
                { id: "w3", name: "钢刀", icon: "🔪", price: 300, attack: 25, desc: "精钢打造的宝刀" },
                { id: "w4", name: "魔法杖", icon: "🪄", price: 500, attack: 40, desc: "蕴含魔法力量" },
                { id: "w5", name: "龙牙剑", icon: "🐉", price: 1000, attack: 80, desc: "传说中的神兵" }
            ],
            armor: [
                { id: "a1", name: "布衣", icon: "👕", price: 40, defense: 3, desc: "普通的布衣" },
                { id: "a2", name: "皮甲", icon: "🦺", price: 120, defense: 8, desc: "兽皮制作的护甲" },
                { id: "a3", name: "铁甲", icon: "👔", price: 250, defense: 15, desc: "铁制铠甲" },
                { id: "a4", name: "钢甲", icon: "🛡️", price: 450, defense: 30, desc: "精钢铠甲" },
                { id: "a5", name: "龙鳞甲", icon: "👑", price: 900, defense: 60, desc: "龙鳞制成的传说护甲" }
            ],
            items: [
                { id: "i1", name: "小药水", icon: "🧪", price: 20, hp: 30, desc: "恢复30点生命" },
                { id: "i2", name: "大药水", icon: "🧫", price: 50, hp: 80, desc: "恢复80点生命" },
                { id: "i3", name: "能量饮料", icon: "🥤", price: 30, energy: 20, desc: "恢复20点体力" },
                { id: "i4", name: "超级药水", icon: "🏺", price: 100, hp: 200, desc: "恢复200点生命" },
                { id: "i5", name: "全恢复药", icon: "💊", price: 200, hp: 999, energy: 999, desc: "完全恢复生命和体力" }
            ],
            skills: [
                { id: "s1", name: "重击", icon: "💥", price: 100, desc: "攻击时50%概率造成1.5倍伤害" },
                { id: "s2", name: "连击", icon: "⚡", price: 200, desc: "攻击时20%概率攻击两次" },
                { id: "s3", name: "吸血", icon: "🧛", price: 300, desc: "造成伤害的20%转化为生命" },
                { id: "s4", name: "护盾", icon: "🔰", price: 250, desc: "受到的伤害减少30%" },
                { id: "s5", name: "暴击", icon: "💢", price: 400, desc: "攻击时30%概率造成2倍伤害" }
            ]
        };

        var currentShopTab = "weapons";
        var ownedItems = [];

        function switchShopTab(tab) {
            currentShopTab = tab;
            renderShop();
        }

        function renderShop() {
            var items = shopData[currentShopTab];
            var html = "";
            items.forEach(function(item) {
                var isOwned = ownedItems.includes(item.id);
                var btnText = isOwned ? "已拥有" : item.price + " 金币";
                var btnStyle = isOwned ? "background: #ccc;" : "";
                var stat = item.attack ? "+" + item.attack + " 攻击" : item.defense ? "+" + item.defense + " 防御" : "";
                html += '<div style="background: #F7F9FC; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center;">' +
                    '<div style="display: flex; align-items: center; gap: 15px;">' +
                        '<div style="font-size: 30px;">' + item.icon + '</div>' +
                        '<div>' +
                            '<div style="font-weight: bold;">' + item.name + '</div>' +
                            '<div style="font-size: 12px; color: #666;">' + item.desc + '</div>' +
                            (stat ? '<div style="font-size: 12px; color: #667eea; font-weight: bold;">' + stat + '</div>' : '') +
                        '</div>' +
                    '</div>' +
                    '<button class="btn" style="width: auto; padding: 10px 20px; ' + btnStyle + '" onclick="buyItem(' + "'" + item.id + "'" + ')" ' + (isOwned ? "disabled" : "") + '>' + btnText + '</button>' +
                '</div>';
            });
            document.getElementById("shopItems").innerHTML = html;
        }

        function buyItem(itemId) {
            var item = shopData[currentShopTab].find(function(i) { return i.id === itemId; });
            if (!item) return;
            
            if (gameData.coins < item.price) {
                showModal("金币不足", "你的金币不够购买这个物品");
                return;
            }
            
            gameData.coins -= item.price;
            ownedItems.push(itemId);
            
            if (item.attack) gameData.attack = (gameData.attack || 10) + item.attack;
            if (item.defense) gameData.defense = (gameData.defense || 5) + item.defense;
            if (item.hp) gameData.hp = Math.min(gameData.hp + item.hp, 100);
            if (item.energy) gameData.energy = Math.min(gameData.energy + item.energy, 100);
            
            showModal("购买成功", "你获得了 " + item.icon + " " + item.name + "！");
            updateUI();
            renderShop();
        }

function showShop() {
            hideAll();
            document.getElementById('shop').classList.remove('hidden');
            document.getElementById('shopCoins').textContent = gameData.coins;
            renderShop();
        }

        function showStats() {
            hideAll();
            document.getElementById('stats').classList.remove('hidden');
        }

        // 基础教学
        function switchTab(type) {
            document.querySelectorAll('.learning-tab').forEach(function(t) {
                t.classList.remove('active');
            });
            event.target.classList.add('active');
            
            var content = document.getElementById('learningContent');
            var data = pinyinData[type];
            var html = '<div class="pinyin-grid">';
            data.forEach(function(py) {
                html += '<div class="pinyin-card" onclick="sayPinyin(\'' + py + '\')">' + py + '</div>';
            });
            html += '</div>';
            content.innerHTML = html;
        }

        function sayPinyin(py) {
            alert('拼音: ' + py);
            // 标记为已学习
            var activeTab = document.querySelector('.learning-tab.active');
            if (activeTab) {
                var type = activeTab.textContent.includes('声母') ? 'initial' : 
                          activeTab.textContent.includes('韵母') ? 'final' : 'whole';
                learningProgress[type] = true;
            }
        }

        function completeLearning() {
            if (learningProgress.initial && learningProgress.final && learningProgress.whole) {
                gameData.learningComplete = true;
                document.getElementById('challengeCard').classList.remove('locked');
                showModal('🎉 恭喜！', '你已完成基础教学，现在可以进入闯关模式了！');
                document.getElementById('learningBadge').textContent = '已完成';
            } else {
                showModal('提示', '请先学习完声母、韵母和整体认读');
            }
        }

        // 游戏答题
        function startQuiz() {
            currentQuestion = 1;
            correctCount = 0;
            showQuestion();
        }

        function showQuestion() {
            document.getElementById('currentQ').textContent = currentQuestion;
            document.getElementById('progressFill').style.width = (currentQuestion * 10) + '%';
            document.getElementById('questionDisplay').textContent = 'b';
            
            var options = [
                { text: '玻', correct: true },
                { text: '坡', correct: false },
                { text: '摸', correct: false },
                { text: '佛', correct: false }
            ];
            
            var html = '';
            options.forEach(function(opt, idx) {
                html += '<button class="option-btn" onclick="answer(' + opt.correct + ', this)">' + opt.text + '</button>';
            });
            document.getElementById('optionsGrid').innerHTML = html;
        }

        function answer(isCorrect, btn) {
            if (isCorrect) {
                btn.classList.add('correct');
                correctCount++;
                gameData.coins += 5;
            } else {
                btn.classList.add('wrong');
            }
            
            setTimeout(function() {
                currentQuestion++;
                if (currentQuestion <= 10) {
                    showQuestion();
                } else {
                    showModal('关卡完成！', '你答对了 ' + correctCount + '/10 题\n获得 ' + (correctCount * 5) + ' 金币');
                    showMainMenu();
                }
            }, 500);
        }

        // 探险
        function explore(location) {
            var cost = location === 'forest' ? 10 : location === 'desert' ? 15 : 20;
            if (gameData.energy < cost) {
                showModal('体力不足', '你的体力不足，请休息或购买药水');
                return;
            }
            
            gameData.energy -= cost;
            
            // 70%战斗，30%宝藏
            var rand = Math.random();
            if (rand < 0.7) {
                showModal('⚔️ 遭遇战斗！', '你遇到了拼音怪兽！\n快回答拼音问题来击败它！');
            } else {
                var coins = Math.floor(Math.random() * 50) + 20;
                gameData.coins += coins;
                showModal('💎 发现宝藏！', '你发现了一处宝藏！\n获得 ' + coins + ' 金币');
            }
            updateUI();
        }

        // 商店
        

        // 弹窗
        function showModal(title, text) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalText').textContent = text;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        // 更新UI
        function updateUI() {
            document.getElementById('coins').textContent = gameData.coins;
            document.getElementById('hp').textContent = gameData.hp;
            document.getElementById('exp').textContent = gameData.exp;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化学习进度
            switchTab('initial');
        });

        // 防止双击缩放
        document.addEventListener('dblclick', function(e) {
            e.preventDefault();
        }, { passive: false });

        // 触摸优化
        document.addEventListener('touchstart', function(){}, {passive: true});
    </script>
</body>
</html>
