<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼音游戏测试版</title>
    <style>
        body { font-family: sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; }
        .btn { display: block; width: 100%; padding: 20px; margin: 10px 0; background: #667eea; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; }
        .btn:active { background: #764ba2; }
        .hidden { display: none; }
        .page { padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 主菜单 -->
        <div id="mainMenu" class="page">
            <h1>🎮 拼音大冒险</h1>
            <button class="btn" onclick="showPage('learning')">📖 基础教学</button>
            <button class="btn" onclick="showPage('game')">🎮 开始游戏</button>
            <button class="btn" onclick="showPage('pet')">🐼 我的宠物</button>
        </div>

        <!-- 基础教学 -->
        <div id="learning" class="page hidden">
            <h2>📖 基础教学</h2>
            <p>声母、韵母、整体认读</p>
            <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;">
                <button onclick="alert('拼音: b')">b</button>
                <button onclick="alert('拼音: p')">p</button>
                <button onclick="alert('拼音: m')">m</button>
                <button onclick="alert('拼音: f')">f</button>
                <button onclick="alert('拼音: d')">d</button>
            </div>
            <br>
            <button class="btn" onclick="showPage('mainMenu')">← 返回主菜单</button>
        </div>

        <!-- 游戏页面 -->
        <div id="game" class="page hidden">
            <h2>🎮 游戏关卡</h2>
            <p>请选择关卡：</p>
            <button class="btn" onclick="alert('开始第1关！')">第1关 - 声母入门</button>
            <button class="btn" onclick="alert('开始第2关！')">第2关 - 声母进阶</button>
            <br>
            <button class="btn" onclick="showPage('mainMenu')">← 返回主菜单</button>
        </div>

        <!-- 宠物页面 -->
        <div id="pet" class="page hidden">
            <h2>🐼 我的宠物</h2>
            <div style="text-align: center; font-size: 80px;">🐼</div>
            <p>名称: 拼音小熊猫</p>
            <p>等级: 1</p>
            <p>经验: 0/100</p>
            <br>
            <button class="btn" onclick="showPage('mainMenu')">← 返回主菜单</button>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            // 隐藏所有页面
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            // 显示指定页面
            document.getElementById(pageId).classList.remove('hidden');
        }

        // 移动端触摸优化
        document.addEventListener('touchstart', function(){}, {passive: true});
        
        // 防止双击缩放
        document.addEventListener('dblclick', function(e) {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
